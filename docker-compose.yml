services:
  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - openclaw_net
    restart: unless-stopped

  # ─── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - openclaw_net
    restart: unless-stopped

  # ─── FastAPI Backend + AI Agents ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SITE_URL=${SITE_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - openclaw_net
    restart: unless-stopped

  # ─── Agent Scheduler (4時間ごとの記事自動生成 + GitHub Pages公開) ────
  agent-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "scheduler.py"]
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ARTICLE_GENERATION_INTERVAL_HOURS=${ARTICLE_GENERATION_INTERVAL_HOURS:-4}
      - GH_TOKEN=${GH_TOKEN}
      - GIT_USER_NAME=OpenClaw Bot
      - GIT_USER_EMAIL=bot@openclaw.local
      - SITE_DIR=/mainproject/site
      - PROJECT_DIR=/mainproject
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
      # mainプロジェクト全体をマウント（Hugo site書き出し + git push用）
      - /Users/Mrt0309/Desktop/openclaw_seo:/mainproject:rw
    networks:
      - openclaw_net
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: password
      POSTGRES_DB: realestate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - openclaw_net
    restart: unless-stopped

  # ─── Redis (Cache + Job Queue) ─────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - openclaw_net
    restart: unless-stopped

networks:
  openclaw_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
