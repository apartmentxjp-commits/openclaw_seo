{{ define "main" }}
<section class="search-section">
    <div class="search-box">
        <h1 style="font-size: 1.75rem; color: var(--primary); margin-bottom: 10px;">エリア・住所から相場を調べる</h1>
        <p style="color: var(--text-muted); margin-bottom: 24px;">最新の不動産取引価格データを基にした公式な相場情報を提供します。</p>
        <div class="search-input-group" style="display: flex; gap: 10px;">
            <input type="text" id="address-search" placeholder="市区町村、町名を入力（例：世田谷区 三軒茶屋）"
                style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 4px;">
            <button onclick="searchAddress()"
                style="padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">検索</button>
        </div>
    </div>

    <div class="region-selector" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
        <h3 style="margin-bottom: 20px;">都道府県から探す</h3>
        <div class="region-grid">
            <div class="region-block">
                <h4 style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">関東</h4>
                <ul class="widget-list">
                    <li><a href="/openclaw_seo/site/public/post/">東京都</a></li>
                    <li><a href="#">神奈川県</a></li>
                    <li><a href="#">千葉県</a></li>
                    <li><a href="#">埼玉県</a></li>
                </ul>
            </div>
            <div class="region-block">
                <h4 style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">関西</h4>
                <ul class="widget-list">
                    <li><a href="#">大阪府</a></li>
                    <li><a href="#">京都府</a></li>
                    <li><a href="#">兵庫県</a></li>
                </ul>
            </div>
            <div class="region-block">
                <h4 style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">九州</h4>
                <ul class="widget-list">
                    <li><a href="#">福岡県</a></li>
                    <li><a href="#">熊本県</a></li>
                </ul>
            </div>
        </div>
    </div>
</section>

<section class="post-list">
    <h1 style="font-size: 1.5rem; margin-bottom: 20px;">最新の調査レポート</h1>
    {{ range .Paginator.Pages }}
    <div class="post-item"
        style="background: white; padding: 25px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border);">
        <h2 style="margin: 0 0 10px 0;"><a href="{{ .Permalink }}"
                style="color: var(--primary); text-decoration: none;">{{ .Title }}</a></h2>
        <p style="font-size: 0.95rem; color: var(--text-main);">{{ .Summary }}...</p>
    </div>
    {{ end }}
</section>

<script>
    function searchAddress() {
        const query = document.getElementById('address-search').value;
        if (query) {
            window.location.href = "/openclaw_seo/site/public/post/";
        }
    }
</script>
{{ end }}
