{{ define "main" }}
<section class="post-list">
    <div class="section-header">
        <h1>調査レポート一覧</h1>
        <p>日本全国の不動産取引データに基づく最新分析レポート</p>
    </div>

    {{ range .Paginator.Pages }}
    {{ if ne .Layout "tool" }}
    <a href="{{ .Permalink }}" class="post-card">
        <div class="post-info">
            <h3>{{ .Title }}</h3>
            <p>{{ .Summary | truncate 150 }}</p>
        </div>
    </a>
    {{ end }}
    {{ end }}

    <div class="pagination">
        {{ if .Paginator.HasPrev }}
        <a href="{{ .Paginator.Prev.URL }}" class="nav-link">&laquo; 前へ</a>
        {{ end }}
        {{ if .Paginator.HasNext }}
        <a href="{{ .Paginator.Next.URL }}" class="nav-link">次へ &raquo;</a>
        {{ end }}
    </div>
</section>
{{ end }}
