{{ define "main" }}
<section class="search-section">
    <div class="search-box">
        <h2>エリア・住所から相場を調べる</h2>
        <div class="search-input-group">
            <input type="text" id="address-search" placeholder="市区町村、町名を入力（例：世田谷区 三軒茶屋）">
            <button onclick="searchAddress()">検索</button>
        </div>
    </div>

    <div class="region-selector">
        <h3>都道府県から探す</h3>
        <div class="region-grid">
            <div class="region-block">
                <h4>関東</h4>
                <ul>
                    <li><a href="/openclaw_seo/site/public/post/">東京都</a></li>
                    <li><a href="#">神奈川県</a></li>
                    <li><a href="#">千葉県</a></li>
                    <li><a href="#">埼玉県</a></li>
                </ul>
            </div>
            <div class="region-block">
                <h4>関西</h4>
                <ul>
                    <li><a href="#">大阪府</a></li>
                    <li><a href="#">京都府</a></li>
                    <li><a href="#">兵庫県</a></li>
                </ul>
            </div>
            <div class="region-block">
                <h4>中部・東海</h4>
                <ul>
                    <li><a href="#">愛知県</a></li>
                    <li><a href="#">静岡県</a></li>
                </ul>
            </div>
            <div class="region-block">
                <h4>その他</h4>
                <ul>
                    <li><a href="#">北海道</a></li>
                    <li><a href="#">福岡県</a></li>
                </ul>
            </div>
        </div>
    </div>
</section>

<section class="post-list">
    <h3>最新の分析レポート</h3>
    {{ range .Paginator.Pages }}
    <div class="post-item">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <div class="meta">{{ .Date.Format "2006/01/02" }}</div>
        <p>{{ .Summary }}...</p>
    </div>
    {{ end }}
</section>

<script>
    function searchAddress() {
        const query = document.getElementById('address-search').value;
        if (query) {
            // Simple search simulation for demo
            window.location.href = "/openclaw_seo/site/public/post/";
        }
    }
</script>

<style>
    .search-section {
        background: white;
        padding: 40px;
        border-radius: 16px;
        margin-bottom: 40px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .search-box h2 {
        margin-top: 0;
        margin-bottom: 24px;
        font-size: 1.5rem;
    }

    .search-input-group {
        display: flex;
        gap: 12px;
    }

    .search-input-group input {
        flex: 1;
        padding: 14px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
    }

    .search-input-group button {
        padding: 0 32px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }

    .region-selector {
        margin-top: 40px;
        border-top: 1px solid #f1f5f9;
        padding-top: 30px;
    }

    .region-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 24px;
    }

    .region-block h4 {
        color: #64748b;
        font-size: 0.875rem;
        margin-bottom: 12px;
    }

    .region-block ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .region-block li {
        margin-bottom: 8px;
    }

    .region-block a {
        color: #1e293b;
        text-decoration: none;
        font-size: 0.95rem;
    }

    .region-block a:hover {
        color: #3b82f6;
        text-decoration: underline;
    }
</style>
{{ end }}
