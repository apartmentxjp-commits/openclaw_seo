{{ define "main" }}
<article>
    <header>
        <h1>{{ .Title }}</h1>
    </header>

    <div class="content">
        {{ .Content | safeHTML }}
    </div>

    <nav class="post-navigation"
        style="display: flex; justify-content: space-between; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
        {{ with .PrevInSection }}
        <a href="{{ .Permalink }}" style="text-decoration: none; color: var(--accent); font-weight: 600;">&laquo;
            前のレポート</a>
        {{ end }}
        {{ with .NextInSection }}
        <a href="{{ .Permalink }}" style="text-decoration: none; color: var(--accent); font-weight: 600;">次のレポート
            &raquo;</a>
        {{ end }}
    </nav>
</article>
{{ end }}
