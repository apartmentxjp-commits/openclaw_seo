{{ define "main" }}
<article>
    <header>
        <h1>{{ .Title }}</h1>
    </header>

    <div class="content">
        {{ .Content | safeHTML }}
    </div>

    <div class="post-navigation">
        {{ with .PrevInSection }}
        <a href="{{ .Permalink }}" class="nav-link prev">
            <span class="label">前の分析記事</span>
            <span class="title">{{ .Title }}</span>
        </a>
        {{ end }}
        {{ with .NextInSection }}
        <a href="{{ .Permalink }}" class="nav-link next">
            <span class="label">次の分析記事</span>
            <span class="title">{{ .Title }}</span>
        </a>
        {{ end }}
    </div>
</article>
{{ end }}
