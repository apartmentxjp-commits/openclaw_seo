{{ define "main" }}
<div class="tool-page">
    <header class="tool-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            <p class="tool-description">{{ .Description }}</p>
        </div>
    </header>


    <div class="tool-container">
        {{ .Content | safeHTML }}
    </div>

    {{ if .Params.script }}
    <script src="{{ .Params.script | relURL }}"></script>
    {{ end }}
</div>
{{ end }}
