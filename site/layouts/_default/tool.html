{{ define "main" }}
<div class="tool-page">
    <header class="tool-header">
        <h1>{{ .Title }}</h1>
        <p class="tool-description">{{ .Description }}</p>
    </header>

    <div class="tool-container">
        {{ .Content | safeHTML }}
    </div>

    <!-- Tool Specific Scripts -->
    {{ if .Params.script }}
    <script src="{{ .Params.script | relURL }}"></script>
    {{ end }}
</div>
{{ end }}
